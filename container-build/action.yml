name: container-build
description: build/sign an image and publish its digest in artifact
inputs:
  digest-artifact-prefix:
    description: the prefix of the artifact filename
    default: digest-
  component:
    description: |
      The component name (e.g., policy-server, controller, audit-scanner)
    required: true
  arch:
    description: |
      Target architecture to build (e.g., amd64, arm64)
    required: true
  platform:
    description: |
      Target platform for Docker build (e.g., linux/amd64, linux/arm64)
    required: true
  namespace:
    description: |
      Path prefix for the container image name. The image becomes
      ghcr.io/<owner>/<namespace>/<component>.
    required: true
  github-token:
    description: |
      The GitHub token with permission to publish images to ghcr.
    required: true
runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.github-token }}
    - name: Compute image name
      id: image
      shell: bash
      run: |
        echo "name=ghcr.io/${{ github.repository_owner }}/${{ inputs.namespace }}/${{ inputs.component }}" >> "$GITHUB_OUTPUT"
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ steps.image.outputs.name }}
    - name: Build and push ${{ inputs.component }} for ${{ inputs.arch }}
      id: build-image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: .
        file: ./Dockerfile.${{ inputs.component }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ inputs.platform }}
        push: true
        sbom: true
        provenance: mode=max
        tags: ${{ steps.image.outputs.name }}

    # We need to disable the new bundle format enabled by default since
    # cosign v3.x.x because some verification tools (e.g. slsactl, hauler and old
    # cosign) are not able to properly verify the signatures using this
    # new format
    - name: Sign container image with cosign v2 signature format
      shell: bash
      run: |
        cosign sign --yes --new-bundle-format=false --use-signing-config=false \
          ${{ steps.image.outputs.name }}@${{ steps.build-image.outputs.digest }}

    - name: Sign container image with cosign v3 signature format
      shell: bash
      run: |
        cosign sign --yes --new-bundle-format=true --use-signing-config=true \
          ${{ steps.image.outputs.name }}@${{ steps.build-image.outputs.digest }}

    - name: Verify container image signature
      shell: bash
      run: |
        cosign verify \
          --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
          --certificate-identity="${{ github.server_url }}/${{ github.workflow_ref }}" \
          ${{ steps.image.outputs.name }}@${{ steps.build-image.outputs.digest }}

    - name: Export digest
      shell: bash
      run: |
        mkdir -p ${{ runner.temp }}/digests
        digest="${{ steps.build-image.outputs.digest }}"
        echo "${digest}" > "${{ runner.temp }}/digests/${{ inputs.component }}-${{ inputs.arch }}.txt"

    - name: Upload digest
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.digest-artifact-prefix }}${{ inputs.component }}-${{ inputs.arch }}
        path: ${{ runner.temp }}/digests/*.txt
        retention-days: 1
