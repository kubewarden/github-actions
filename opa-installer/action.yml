name: "opa-installer"
description: "Install opa and add it to PATH"
branding:
  icon: "package"
  color: "blue"
inputs:
  opa-version:
    description: "opa release to be installed"
    required: false
    default: "v0.65.0"
  checksum:
    description: "SHA256 checksum of the opa release binary. When unset, the release checksum is downloaded."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        #!/bin/bash
        set -euo pipefail

        VERSION="${{ inputs.opa-version }}"
        CHECKSUM="${{ inputs.checksum }}"
        INSTALL_DIR="$HOME/.opa"
        OPA_BINARY="opa_linux_amd64_static"
        CHECKSUM_FILE="${OPA_BINARY}.sha256"

        mkdir -p "$INSTALL_DIR"

        curl -fsSL "https://github.com/open-policy-agent/opa/releases/download/${VERSION}/${OPA_BINARY}" -o "$INSTALL_DIR/$OPA_BINARY"
        if [ -z "$CHECKSUM" ]; then
          curl -fsSL "https://github.com/open-policy-agent/opa/releases/download/${VERSION}/${CHECKSUM_FILE}" -o "$INSTALL_DIR/$CHECKSUM_FILE"
        else
          printf "%s  %s\n" "$CHECKSUM" "$OPA_BINARY" > "$INSTALL_DIR/$CHECKSUM_FILE"
        fi

        (
          cd "$INSTALL_DIR"
          sha256sum --check "$CHECKSUM_FILE"
        )

        mv "$INSTALL_DIR/$OPA_BINARY" "$INSTALL_DIR/opa"
        chmod 755 "$INSTALL_DIR/opa"
        echo "$INSTALL_DIR" >> "$GITHUB_PATH"
