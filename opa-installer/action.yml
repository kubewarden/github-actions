name: "opa-installer"
description: "Install opa and add it to PATH"
branding:
  icon: "package"
  color: "blue"
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        #!/bin/bash
        set -e

        VERSION="v0.65.0"
        CHECKSUM="cd6b0b2d762571a746f0261890b155e6dd71cca90dad6b42b6fcf6dd7f619f08"
        INSTALL_DIR=$HOME/.opa

        mkdir -p $INSTALL_DIR

        curl -sL https://github.com/open-policy-agent/opa/releases/download/${VERSION}/opa_linux_amd64_static -o $INSTALL_DIR/opa
        echo "${CHECKSUM}  $INSTALL_DIR/opa" | sha256sum --check

        chmod 755 $INSTALL_DIR/opa
        echo $INSTALL_DIR >> $GITHUB_PATH
