name: "kubewarden-policy-gh-action-dependencies"
description: "Install all the binaries needed inside of GH action"
branding:
  icon: "package"
  color: "blue"
runs:
  using: "composite"
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
    - name: Install kwctl
      uses: kubewarden/github-actions/kwctl-installer@f37a8ae3949573fb4dcce1ff774cf40770f6ff11
    - name: Install bats
      run: sudo apt install -y bats
      shell: bash
    - name: Install SBOM generator tool
      uses: kubewarden/github-actions/syft-installer@f37a8ae3949573fb4dcce1ff774cf40770f6ff11
    - name: Install binaryen tool
      uses: kubewarden/github-actions/binaryen-installer@f37a8ae3949573fb4dcce1ff774cf40770f6ff11
